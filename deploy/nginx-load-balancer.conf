# Example Nginx configuration to load balance multiple API instances.
# Copy to /etc/nginx/conf.d/doorsteptn-api.conf and adjust paths/hosts.

upstream doorstep_api {
    # Point these to each Node/PM2 instance that runs the Express app.
    server 127.0.0.1:5000 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:5001 max_fails=3 fail_timeout=30s;
    # Add more servers/IPs here or reference container hostnames when using Docker/Kubernetes.
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name api.doorsteptn.in doorsteptn.in;

    # Optional automatic HTTP->HTTPS redirect when TLS is terminated elsewhere.
    # return 301 https://$host$request_uri;

    # Security headers (set at proxy so responses remain hardened even if app settings drift).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' https://www.gstatic.com https://www.google.com/recaptcha/ https://www.recaptcha.net/recaptcha/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://www.google.com https://www.gstatic.com https://*.tile.openstreetmap.org https://*.openstreetmap.org; connect-src 'self' https://api.doorsteptn.in https://*.googleapis.com https://*.google.com https://*.gstatic.com https://*.firebaseio.com https://*.firebaseapp.com; frame-src 'self' https://www.google.com/recaptcha/ https://www.recaptcha.net/recaptcha/; worker-src 'self' blob:; manifest-src 'self'; media-src 'self' blob: data:; upgrade-insecure-requests" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(self), gyroscope=(), magnetometer=(), microphone=(), payment=(self), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Pass client and proxy metadata through to Express so rate-limiters and logging stay accurate.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location / {
        proxy_pass http://doorstep_api;
        proxy_read_timeout 90s;
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;

        # Disable buffering so streaming/websocket responses return immediately.
        proxy_buffering off;
    }

    # External/load-balancer health endpoint wired to readiness checks.
    location = /healthz {
        proxy_pass http://doorstep_api/api/health/ready;
        proxy_connect_timeout 2s;
        proxy_read_timeout 3s;
        access_log off;
    }

    # Serve uploaded assets directly if desired. Update the path to match your deployment.
    location /uploads/ {
        alias /var/www/indian-budget-tracker/uploads/;
        autoindex off;
        access_log off;
        add_header Cache-Control "public, max-age=300";
    }
}
