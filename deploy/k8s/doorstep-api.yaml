apiVersion: apps/v1
kind: Deployment
metadata:
  name: doorstep-api
  labels:
    app: doorstep-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doorstep-api
  template:
    metadata:
      labels:
        app: doorstep-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: your-registry/doorstep-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: READINESS_TIMEOUT_MS
              value: "2000"
            - name: SHUTDOWN_TIMEOUT_MS
              value: "15000"
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 5
---
apiVersion: v1
kind: Service
metadata:
  name: doorstep-api
  labels:
    app: doorstep-api
spec:
  selector:
    app: doorstep-api
  ports:
    - name: http
      port: 80
      targetPort: http
