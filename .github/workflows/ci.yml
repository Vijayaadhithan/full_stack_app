name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  actions: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run check
      - run: npm run test:coverage
      - run: npm run lint
      - name: Remove existing repo artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v8
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            const staleArtifacts = artifacts.filter((artifact) => !artifact.expired);

            if (staleArtifacts.length === 0) {
              core.info('No existing artifacts found.');
              return;
            }

            for (const artifact of staleArtifacts) {
              core.info(
                `Deleting artifact ${artifact.id} (${artifact.name}) from run ${artifact.workflow_run?.id ?? 'unknown'}`
              );
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }

            core.info(`Deleted ${staleArtifacts.length} existing artifact(s).`);
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: coverage
          path: coverage
          retention-days: 1
